events {
    # Es obligatorio definir las conexiones máximas
    worker_connections 1024;
}

http {
    upstream app {
        # Estrategia Canary: 80% del tráfico a Blue, 20% a Green
        server blue:3000 weight=8;
        server green:3000 weight=2;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app;
            
            # Estas cabeceras son fundamentales para que tu App 
            # reconozca la IP real del usuario y no la de Nginx
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}